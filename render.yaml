# Render deployment config
# Auto-detected when this file is at repo root.
# Docs: https://render.com/docs/blueprint-spec

services:
  - type: web
    name: ai-ecommerce-search-backend
    runtime: python
    plan: starter
    # Build from repo root so the sibling `data/` folder is included.
    buildCommand: pip install -r backend/requirements.txt
    startCommand: cd backend && uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: PYTHON_VERSION
        value: "3.11"
      - key: GROQ_API_KEY
        sync: false        # set in Render dashboard, do not commit
      - key: ALLOWED_ORIGINS
        value: "https://search-ai-ebon.vercel.app"

  - type: web
    name: ai-ecommerce-search-frontend
    runtime: static
    rootDir: frontend
    buildCommand: npm ci && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_URL
        value: "https://searchai-oftu.onrender.com"
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
