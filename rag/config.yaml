# RAG Pipeline Configuration
# Single source of truth for models, chunking, retrieval, and generation.

embedding:
  provider: "sentence-transformers"   # local embeddings (Groq has no embeddings API)
  model_name: "sentence-transformers/all-MiniLM-L6-v2"
  dimension: 384
  batch_size: 32

chunking:
  chunk_size: 512
  chunk_overlap: 64
  separators: ["\n\n", "\n", ". ", " ", ""]

vector_store:
  backend: "faiss"                    # "faiss" or "qdrant"
  persist_dir: "./rag/data/faiss_index"
  qdrant_url: "http://localhost:6333"
  collection_name: "rag_docs"

retrieval:
  top_k: 5
  bm25_top_k: 10
  dense_top_k: 10
  rrf_k: 60                           # RRF smoothing constant
  score_threshold: 0.25               # below this -> "not enough context"

generation:
  provider: "groq"                     # "groq" or "ollama"
  groq_model: "llama-3.1-8b-instant"   # or "mixtral-8x7b-32768", "llama-3.1-70b-versatile"
  ollama_model: "llama3.1:8b"
  ollama_base_url: "http://localhost:11434"
  temperature: 0.1
  max_tokens: 512

evaluation:
  enable_ragas: true
  log_path: "./rag/data/eval_logs.jsonl"

ingestion:
  data_dir: "./rag/data/raw"
  supported_extensions: [".pdf", ".txt", ".csv", ".md"]
