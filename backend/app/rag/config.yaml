app:
  name: "AI E-Commerce Search RAG"

paths:
  data_dir: "rag/data"
  faiss_index_path: "rag/data/rag_chunks.index"
  metadata_store_path: "rag/data/rag_chunks.jsonl"
  embeddings_store_path: "rag/data/rag_embeddings.npy"

chunking:
  chunk_size: 900
  chunk_overlap: 150
  separators:
    - "\n\n"
    - "\n"
    - ". "
    - " "
    - ""

embeddings:
  provider: "sentence-transformers"
  sentence_transformer_model: "all-MiniLM-L6-v2"
  batch_size: 32
  normalize: true

vector_store:
  provider: "faiss"
  qdrant_url: "http://localhost:6333"
  qdrant_collection: "rag_chunks"
  distance: "cosine"

retrieval:
  vector_top_k: 8
  bm25_top_k: 8
  final_top_k: 5
  rrf_k: 60
  low_confidence_threshold: 0.12
  min_source_score: 0.05

generation:
  provider: "groq"
  groq_model: "llama-3.1-8b-instant"
  ollama_model: "llama3.1:8b"
  ollama_base_url: "http://localhost:11434"
  temperature: 0.1
  max_tokens: 700

evaluation:
  enabled: true
  answer_relevancy_model: "llama-3.1-8b-instant"

logging:
  level: "INFO"
